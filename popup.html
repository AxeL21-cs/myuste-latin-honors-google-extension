<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>myUSTe Latin Honors Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="wrap">
    <h1>myUSTe Latin Honors Tracker</h1>
    <div class="card">
      <div class="section-title">Current visible term</div>
      <div id="latest">Open the myUSTe Grades page to load data.</div>
      <div class="popup-actions">
        <button id="openTrackerBtn" class="secondary-action">Open tracker on this page</button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Cumulative standing</div>
      <div id="cumulative">No saved terms yet.</div>
    </div>
    <div class="card">
      <div class="section-title">Saved terms</div>
      <div id="terms"></div>
      <button id="clearBtn">Clear saved terms</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
